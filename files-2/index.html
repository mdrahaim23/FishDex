<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>FISHDEX</title>
<meta name="description" content="Pokédex-style fishing collection tracker">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a2942">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FISHDEX">

<!-- Icons -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<style>
  :root {
    --bg-deep: #0a2942;
    --bg-mid: #1a4a6e;
    --bg-shallow: #3d7ea6;
    --bg-surface: #5fa8c9;
    --foam: #e8f4f8;
    --ink: #0a1a2a;
    --ink-soft: #2a3a4a;
    --paper: #f4ead5;

    --r-common: #7dd3fc;
    --r-common-deep: #0284c7;

    --r-rare: #fb923c;
    --r-rare-deep: #c2410c;

    --r-epic: #f0abfc;
    --r-epic-deep: #a21caf;

    --r-legendary-1: #fbcfe8;
    --r-legendary-2: #ffffff;
    --r-legendary-3: #bae6fd;
    --r-legendary-deep: #7c3aed;

    --r-champion-1: #fef3c7;
    --r-champion-2: #fbbf24;
    --r-champion-3: #d97706;
    --r-champion-4: #fde047;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Bricolage Grotesque', 'Segoe UI', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 40%, var(--bg-shallow) 80%, var(--bg-surface) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    overflow-x: hidden;
    image-rendering: pixelated;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 0px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(255,255,255,0.03) 0px, transparent 1px),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04) 0px, transparent 1px);
    background-size: 60px 60px, 90px 90px, 120px 120px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 10% 90%, rgba(255,255,255,0.15) 2px, transparent 3px),
      radial-gradient(circle at 80% 95%, rgba(255,255,255,0.1) 1.5px, transparent 2.5px),
      radial-gradient(circle at 30% 70%, rgba(255,255,255,0.08) 2px, transparent 3px),
      radial-gradient(circle at 65% 40%, rgba(255,255,255,0.06) 1px, transparent 2px);
    background-size: 200px 400px, 250px 500px, 300px 600px, 180px 350px;
    animation: drift 30s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    from { background-position: 0 0, 0 0, 0 0, 0 0; }
    to   { background-position: 0 -400px, 0 -500px, 0 -600px, 0 -350px; }
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 80px;
    min-height: 100vh;
  }

  .pixel { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }

  /* === HOME === */
  .home-wrap {
    padding-top: 32px;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .logo {
    font-family: 'Bungee', 'Bricolage Grotesque', sans-serif;
    font-size: 44px;
    line-height: 0.95;
    color: var(--foam);
    letter-spacing: 2px;
    text-shadow:
      3px 3px 0 var(--bg-deep),
      6px 6px 0 rgba(0,0,0,0.3);
    margin-bottom: 8px;
  }
  .logo-sub {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .bubble-btn {
    display: block;
    width: 100%;
    padding: 22px 24px;
    margin-bottom: 16px;
    border: none;
    border-radius: 28px;
    font-family: 'Bungee', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--ink);
    cursor: pointer;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    background: linear-gradient(180deg, #ffffff 0%, #d8e8f0 100%);
    box-shadow:
      0 6px 0 rgba(0,0,0,0.25),
      inset 0 2px 0 rgba(255,255,255,0.9),
      inset 0 -8px 12px rgba(0,0,0,0.08);
  }
  .bubble-btn:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow:
      0 3px 0 rgba(0,0,0,0.25),
      inset 0 2px 0 rgba(255,255,255,0.9);
  }
  .bubble-btn[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
    filter: grayscale(0.6);
  }
  .bubble-btn .sub {
    display: block;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin-top: 2px;
    font-weight: 600;
  }
  .bubble-btn.salt    { background: linear-gradient(180deg, #93e0ff 0%, #4aa6cc 100%); }
  .bubble-btn.newfish {
    background: linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
    color: #5a2d0a;
  }
  .bubble-btn.log     {
    background: linear-gradient(180deg, #fbcfe8 0%, #db2777 100%);
    color: #4a0c2c;
  }

  /* === SHARED HEADER === */
  .scr-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-top: 4px;
  }
  .scr-title {
    font-family: 'Bungee', sans-serif;
    color: var(--foam);
    font-size: 26px;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--bg-deep);
  }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.35);
    color: var(--foam);
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:active { background: rgba(255,255,255,0.3); }

  /* === COLLECTION === */
  .stats-bar {
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    color: var(--foam);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .stats-bar strong { font-family: 'Bungee', sans-serif; font-size: 18px; }

  .rarity-section { margin-bottom: 28px; }
  .rarity-header {
    font-family: 'Bungee', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 10px 16px;
    border-radius: 12px;
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .rarity-header.common    { background: linear-gradient(90deg, var(--r-common-deep), var(--r-common)); color: #fff; }
  .rarity-header.rare      { background: linear-gradient(90deg, var(--r-rare-deep), var(--r-rare)); color: #fff; }
  .rarity-header.epic      { background: linear-gradient(90deg, var(--r-epic-deep), var(--r-epic)); color: #fff; }

  /* LEGENDARY HEADER — palindromic gradient = seamless loop */
  .rarity-header.legendary {
    background: linear-gradient(90deg,
      var(--r-legendary-1) 0%,
      var(--r-legendary-2) 25%,
      var(--r-legendary-3) 50%,
      var(--r-legendary-2) 75%,
      var(--r-legendary-1) 100%);
    background-size: 200% 100%;
    animation: shimmerLoop 4s ease-in-out infinite;
    color: #4c1d95;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    box-shadow: 0 0 14px rgba(186, 230, 253, 0.4);
  }

  /* CHAMPION HEADER — palindromic gold loop */
  .rarity-header.champion {
    background: linear-gradient(90deg,
      var(--r-champion-3) 0%,
      var(--r-champion-4) 25%,
      var(--r-champion-1) 50%,
      var(--r-champion-4) 75%,
      var(--r-champion-3) 100%);
    background-size: 200% 100%;
    animation: shimmerLoop 3s ease-in-out infinite;
    color: #3a2208;
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    box-shadow: 0 0 22px rgba(251, 191, 36, 0.55), inset 0 0 0 2px rgba(255,255,255,0.4);
  }

  /* a palindromic gradient loops seamlessly when shifted by one tile */
  @keyframes shimmerLoop {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .rarity-header .count {
    font-size: 11px;
    background: rgba(0,0,0,0.25);
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 1.5px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .grid.dense { gap: 10px; }

  .card {
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    border: 3px solid;
    background: rgba(255,255,255,0.85);
    position: relative;
    cursor: pointer;
    perspective: 800px;
    transition: transform 0.15s;
    overflow: visible;
  }
  .card.uncaught { cursor: default; background: rgba(20, 40, 60, 0.55); }
  .card.uncaught.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-4px); }
    40%,80% { transform: translateX(4px); }
  }

  .card-inner {
    width: 100%; height: 100%;
    transition: transform 0.5s;
    transform-style: preserve-3d;
    position: relative;
    border-radius: 13px;
    overflow: hidden;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }
  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(180deg, var(--paper) 0%, #e8dcb8 100%);
    color: var(--ink);
    font-size: 11px;
    text-align: left;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
  }
  .card-back .field { margin-bottom: 6px; }
  .card-back .label {
    font-family: 'Bungee', sans-serif;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: var(--ink-soft);
    margin-bottom: 1px;
  }
  .card-back .val { font-size: 12px; word-wrap: break-word; }

  .card-img-wrap {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-img {
    max-width: 92%;
    max-height: 70%;
    object-fit: contain;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
  }
  .card.uncaught .card-img {
    filter: brightness(0) opacity(0.55) drop-shadow(0 0 0 #000);
  }
  .card-name {
    font-family: 'Bungee', sans-serif;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-align: center;
    color: var(--ink);
    background: rgba(255,255,255,0.7);
    padding: 3px 6px;
    border-radius: 8px;
    margin-top: 4px;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card.uncaught .card-name {
    color: var(--foam);
    background: rgba(0,0,0,0.4);
  }

  .card.r-common    { border-color: var(--r-common); box-shadow: 0 4px 0 var(--r-common-deep); }
  .card.r-rare      { border-color: var(--r-rare); box-shadow: 0 4px 0 var(--r-rare-deep); }
  .card.r-epic      { border-color: var(--r-epic); box-shadow: 0 4px 0 var(--r-epic-deep); }

  /* LEGENDARY CARD — soft holographic with conic shimmer (no banding) */
  .card.r-legendary {
    border: 3px solid #c4b5fd;
    background:
      linear-gradient(135deg,
        rgba(251, 207, 232, 0.45) 0%,
        rgba(255, 255, 255, 0.85) 35%,
        rgba(186, 230, 253, 0.55) 70%,
        rgba(251, 207, 232, 0.45) 100%);
    background-size: 300% 300%;
    animation: holoShift 6s ease-in-out infinite;
    box-shadow:
      0 4px 0 var(--r-legendary-deep),
      0 0 14px rgba(186, 230, 253, 0.45);
    position: relative;
  }
  @keyframes holoShift {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  .card.r-legendary.uncaught {
    border-color: #6b6b6b;
    background: rgba(20,40,60,0.55);
    animation: none;
    box-shadow: 0 4px 0 #333;
  }

  /* CHAMPION CARD — gold sheen, ease-shifted for smoothness */
  .card.r-champion {
    border: 4px solid #fbbf24;
    background: linear-gradient(135deg,
      rgba(217, 119, 6, 0.5) 0%,
      rgba(251, 191, 36, 0.7) 30%,
      rgba(254, 243, 199, 0.85) 50%,
      rgba(251, 191, 36, 0.7) 70%,
      rgba(217, 119, 6, 0.5) 100%);
    background-size: 300% 300%;
    animation: goldShift 5s ease-in-out infinite;
    box-shadow:
      0 4px 0 var(--r-champion-3),
      0 0 24px rgba(251, 191, 36, 0.6),
      inset 0 0 12px rgba(253, 224, 71, 0.25);
    position: relative;
  }
  @keyframes goldShift {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }
  .card.r-champion::after {
    content: '✦';
    position: absolute;
    top: -6px; right: -6px;
    font-size: 14px;
    color: #fef3c7;
    text-shadow: 0 0 6px #fbbf24, 0 0 12px #fbbf24;
    animation: sparkleTwinkle 1.8s ease-in-out infinite;
    z-index: 3;
    pointer-events: none;
  }
  @keyframes sparkleTwinkle {
    0%, 100% { opacity: 0.4; transform: scale(0.8) rotate(0deg); }
    50%      { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }
  .card.r-champion.uncaught {
    border-color: #6b6b6b;
    background: rgba(20,40,60,0.55);
    animation: none;
    box-shadow: 0 4px 0 #333;
  }
  .card.r-champion.uncaught::after { display: none; }

  .new-badge {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #ef4444;
    color: white;
    font-family: 'Bungee', sans-serif;
    font-size: 9px;
    padding: 4px 8px;
    border-radius: 12px;
    border: 2px solid white;
    z-index: 10;
    letter-spacing: 1px;
    box-shadow: 0 2px 6px rgba(239, 68, 68, 0.5);
    animation: pulseBadge 1.5s ease-in-out infinite;
  }
  @keyframes pulseBadge {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  /* === MODAL === */
  .modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: linear-gradient(180deg, #fefcf6 0%, var(--paper) 100%);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 32px;
    animation: slideUp 0.3s cubic-bezier(0.2, 1, 0.3, 1);
    max-height: 90vh;
    overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-grip {
    width: 40px; height: 4px;
    background: rgba(0,0,0,0.2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-fish {
    text-align: center;
    margin-bottom: 18px;
  }
  .modal-fish img {
    max-width: 70%;
    max-height: 110px;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.15));
  }
  .modal-fish h2 {
    font-family: 'Bungee', sans-serif;
    margin-top: 8px;
    font-size: 22px;
    letter-spacing: 1.5px;
    color: var(--ink);
  }
  .modal-fish .rarity-tag {
    display: inline-block;
    font-family: 'Bungee', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 10px;
    margin-top: 6px;
    color: #fff;
  }
  .rarity-tag.common    { background: var(--r-common-deep); }
  .rarity-tag.rare      { background: var(--r-rare-deep); }
  .rarity-tag.epic      { background: var(--r-epic-deep); }
  .rarity-tag.legendary {
    background: linear-gradient(90deg, var(--r-legendary-1), var(--r-legendary-2), var(--r-legendary-3));
    color: #4c1d95;
  }
  .rarity-tag.champion  {
    background: linear-gradient(90deg, var(--r-champion-3), var(--r-champion-4), var(--r-champion-2));
    color: #3a2208;
  }

  .field-block { margin-bottom: 14px; }
  .field-block label {
    display: block;
    font-family: 'Bungee', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .field-block input, .field-block textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid rgba(0,0,0,0.15);
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    background: white;
    color: var(--ink);
  }
  .field-block input:focus, .field-block textarea:focus {
    outline: none;
    border-color: var(--bg-shallow);
  }
  .field-block textarea {
    resize: vertical;
    min-height: 70px;
  }
  .save-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    font-family: 'Bungee', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    background: linear-gradient(180deg, #fbbf24 0%, #d97706 100%);
    color: #3a1a05;
    cursor: pointer;
    box-shadow: 0 4px 0 #92400e;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-top: 6px;
  }
  .save-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #92400e;
  }
  .prev-catch {
    background: rgba(0,0,0,0.05);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .prev-catch strong { color: var(--ink); }

  .confirm-modal {
    background: linear-gradient(180deg, #fefcf6 0%, var(--paper) 100%);
    border-radius: 20px;
    width: calc(100% - 48px);
    max-width: 360px;
    padding: 24px;
    text-align: center;
    align-self: center;
    animation: popIn 0.25s cubic-bezier(0.2, 1.4, 0.4, 1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .confirm-modal h3 {
    font-family: 'Bungee', sans-serif;
    font-size: 18px;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .confirm-modal p {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .confirm-row { display: flex; gap: 10px; }
  .confirm-row button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-family: 'Bungee', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    cursor: pointer;
  }
  .confirm-row .cancel {
    background: rgba(0,0,0,0.08);
    color: var(--ink);
  }
  .confirm-row .danger {
    background: linear-gradient(180deg, #f87171 0%, #b91c1c 100%);
    color: white;
    box-shadow: 0 3px 0 #7f1d1d;
  }
  .confirm-row .danger:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #7f1d1d;
  }
  .confirm-bg {
    align-items: center !important;
  }

  .log-empty {
    text-align: center;
    padding: 60px 20px;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
  }
  .log-entry {
    display: flex;
    gap: 12px;
    background: rgba(255,255,255,0.92);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 5px solid;
    align-items: flex-start;
  }
  .log-entry.r-common    { border-color: var(--r-common-deep); }
  .log-entry.r-rare      { border-color: var(--r-rare-deep); }
  .log-entry.r-epic      { border-color: var(--r-epic-deep); }
  .log-entry.r-legendary { border-color: var(--r-legendary-deep); }
  .log-entry.r-champion  { border-color: var(--r-champion-3); }
  .log-entry img {
    width: 64px; height: 64px;
    object-fit: contain;
    flex-shrink: 0;
  }
  .log-entry .meta { flex: 1; min-width: 0; }
  .log-entry .meta h3 {
    font-family: 'Bungee', sans-serif;
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .log-entry .meta .when {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .log-entry .meta .where {
    font-size: 12px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .log-entry .meta .where::before { content: "📍 "; }
  .log-entry .meta .notes {
    font-size: 11px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 4px;
    line-height: 1.3;
  }
  .log-entry .actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-self: flex-start;
    flex-shrink: 0;
  }
  .log-entry .del,
  .log-entry .edit {
    background: rgba(0,0,0,0.05);
    border: none;
    font-size: 14px;
    color: rgba(0,0,0,0.55);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .log-entry .del { font-size: 16px; color: rgba(0,0,0,0.5); }
  .log-entry .del:hover { background: rgba(239, 68, 68, 0.15); color: #b91c1c; }
  .log-entry .del:active { background: rgba(239, 68, 68, 0.3); }
  .log-entry .edit:hover { background: rgba(59, 130, 246, 0.15); color: #1d4ed8; }
  .log-entry .edit:active { background: rgba(59, 130, 246, 0.3); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 14px;
    z-index: 200;
    animation: toastIn 0.3s, toastOut 0.3s 1.7s forwards;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
  @keyframes toastOut { to { opacity: 0; transform: translate(-50%, 20px); } }

  .footer-cred {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 32px;
    text-transform: uppercase;
  }
</style>

const RARITIES = ['common','rare','epic','legendary','champion'];
const RARITY_LABEL = {
  common: 'Common', rare: 'Rare', epic: 'Epic',
  legendary: 'Legendary', champion: 'Champion'
};

const STATE_KEY = 'fishdex:state:v1';
const LOG_KEY = 'fishdex:log:v1';

let state = { catches: {} };
let log = [];
let view = 'home';
let modalFishId = null;
let flippedCard = null;
let recentlyCaught = new Set();

// Storage layer: localStorage primary, window.storage fallback for one-time migration
// from the original Claude-artifact build. Sync calls now (no awaits) but kept
// `async` signatures so call sites don't need to change.
async function loadState() {
  try {
    let s = localStorage.getItem(STATE_KEY);
    // One-time migration from window.storage (artifact build) if present
    if (!s && typeof window.storage !== 'undefined' && window.storage?.get) {
      try {
        const r = await window.storage.get(STATE_KEY);
        if (r && r.value) { s = r.value; localStorage.setItem(STATE_KEY, s); }
      } catch(_) {}
    }
    if (s) state = JSON.parse(s);
  } catch(e) { state = { catches: {} }; }
  try {
    let l = localStorage.getItem(LOG_KEY);
    if (!l && typeof window.storage !== 'undefined' && window.storage?.get) {
      try {
        const r = await window.storage.get(LOG_KEY);
        if (r && r.value) { l = r.value; localStorage.setItem(LOG_KEY, l); }
      } catch(_) {}
    }
    if (l) log = JSON.parse(l);
  } catch(e) { log = []; }
}
async function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }
  catch(e) { console.error('save state failed', e); }
}
async function saveLog() {
  try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }
  catch(e) { console.error('save log failed', e); }
}

function caughtFor(id) { return state.catches[id]; }
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}
function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0,10);
}
function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
function rarityCount(rarity) {
  const all = FISH.filter(f => f.rarity === rarity);
  const got = all.filter(f => caughtFor(f.id)).length;
  return `${got}/${all.length}`;
}

// after deleting a log entry, reconcile collection state with remaining log
function reconcileCollection() {
  // Build map of fish -> most recent remaining log entry
  const latest = {};
  for (const entry of log) {
    if (!latest[entry.fishId] || entry.date > latest[entry.fishId].date) {
      latest[entry.fishId] = entry;
    }
  }
  // For each fish currently in state.catches, either update to latest or remove
  for (const fishId of Object.keys(state.catches)) {
    if (latest[fishId]) {
      state.catches[fishId] = {
        date: latest[fishId].date,
        location: latest[fishId].location,
        notes: latest[fishId].notes
      };
    } else {
      delete state.catches[fishId];
      recentlyCaught.delete(fishId);
    }
  }
}

function showConfirm({ title, message, confirmText = 'Delete', onConfirm }) {
  const wrapper = document.createElement('div');
  wrapper.className = 'modal-bg confirm-bg';
  wrapper.innerHTML = `
    <div class="confirm-modal" data-stop="1">
      <h3>${escapeHtml(title)}</h3>
      <p>${escapeHtml(message)}</p>
      <div class="confirm-row">
        <button class="cancel" data-act="cancel">CANCEL</button>
        <button class="danger" data-act="ok">${escapeHtml(confirmText)}</button>
      </div>
    </div>
  `;
  wrapper.addEventListener('click', e => {
    if (!e.target.closest('[data-stop]')) wrapper.remove();
  });
  wrapper.querySelector('[data-act="cancel"]').addEventListener('click', () => wrapper.remove());
  wrapper.querySelector('[data-act="ok"]').addEventListener('click', async () => {
    wrapper.remove();
    await onConfirm();
  });
  document.body.appendChild(wrapper);
}

function render() {
  const app = document.getElementById('app');
  if (view === 'home') app.innerHTML = renderHome();
  else if (view === 'collection') app.innerHTML = renderCollection();
  else if (view === 'newfish') app.innerHTML = renderNewFish();
  else if (view === 'log') app.innerHTML = renderLog();
  bindEvents();
}

function renderHome() {
  const totalCaught = Object.keys(state.catches).length;
  return `
    <div class="home-wrap">
      <div class="logo">FISHDEX</div>
      <div class="logo-sub">SALTWATER EDITION</div>
      <button class="bubble-btn salt" data-nav="collection">
        SALTWATER
        <span class="sub">${totalCaught} / ${FISH.length} CAUGHT</span>
      </button>
      <button class="bubble-btn newfish" data-nav="newfish">
        NEW FISH!
        <span class="sub">LOG A CATCH</span>
      </button>
      <button class="bubble-btn log" data-nav="log">
        CATCH LOG
        <span class="sub">${log.length} ENTRIES</span>
      </button>
      <div class="footer-cred">Made by Matthew Rahaim</div>
    </div>
  `;
}

function renderCollection() {
  const totalCaught = Object.keys(state.catches).length;
  let html = `
    <div class="scr-header">
      <div class="scr-title">COLLECTION</div>
      <button class="back-btn" data-nav="home">←</button>
    </div>
    <div class="stats-bar">
      <span>CAUGHT</span>
      <strong>${totalCaught} / ${FISH.length}</strong>
    </div>
  `;
  for (const r of RARITIES) {
    const fishOfRarity = FISH.filter(f => f.rarity === r);
    if (!fishOfRarity.length) continue;
    html += `
      <div class="rarity-section">
        <div class="rarity-header ${r}">
          <span>${RARITY_LABEL[r]}</span>
          <span class="count">${rarityCount(r)}</span>
        </div>
        <div class="grid">
          ${fishOfRarity.map(f => renderCard(f)).join('')}
        </div>
      </div>
    `;
  }
  return html;
}

function renderCard(f) {
  const caught = caughtFor(f.id);
  const isNew = recentlyCaught.has(f.id);
  const cls = `card r-${f.rarity} ${caught ? '' : 'uncaught'}`;
  if (caught) {
    return `
      <div class="${cls}" data-fish="${f.id}" data-action="flip">
        ${isNew ? '<div class="new-badge">NEW!</div>' : ''}
        <div class="card-inner">
          <div class="card-face card-front">
            <div class="card-img-wrap"><img class="card-img pixel" src="${f.img}" alt="${f.name}"></div>
            <div class="card-name">${f.name}</div>
          </div>
          <div class="card-face card-back">
            <div class="field"><div class="label">Caught</div><div class="val">${fmtDate(caught.date)}</div></div>
            <div class="field"><div class="label">Where</div><div class="val">${escapeHtml(caught.location || '—')}</div></div>
            ${caught.notes ? `<div class="field"><div class="label">Notes</div><div class="val">${escapeHtml(caught.notes)}</div></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }
  return `
    <div class="${cls}" data-fish="${f.id}" data-action="shake">
      <div class="card-inner">
        <div class="card-face card-front">
          <div class="card-img-wrap"><img class="card-img pixel" src="${f.img}" alt="???"></div>
          <div class="card-name">???</div>
        </div>
      </div>
    </div>
  `;
}

function renderNewFish() {
  return `
    <div class="scr-header">
      <div class="scr-title">CATCH!</div>
      <button class="back-btn" data-nav="home">←</button>
    </div>
    <p style="color:rgba(255,255,255,0.7);font-size:13px;margin-bottom:18px;letter-spacing:0.5px;text-align:center;">
      Tap the fish you reeled in 🎣
    </p>
    <div class="grid dense">
      ${FISH.map(f => `
        <div class="card r-${f.rarity}" data-fish="${f.id}" data-action="open-modal">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="card-img-wrap"><img class="card-img pixel" src="${f.img}" alt="${f.name}"></div>
              <div class="card-name">${f.name}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderLog() {
  let html = `
    <div class="scr-header">
      <div class="scr-title">CATCH LOG</div>
      <button class="back-btn" data-nav="home">←</button>
    </div>
  `;
  if (!log.length) {
    html += `<div class="log-empty">No catches logged yet.<br>Get out there 🎣</div>`;
    return html;
  }
  const sorted = [...log].sort((a, b) => (b.date + b.id).localeCompare(a.date + a.id));
  html += sorted.map(entry => {
    const f = FISH.find(x => x.id === entry.fishId);
    if (!f) return '';
    return `
      <div class="log-entry r-${f.rarity}">
        <img class="pixel" src="${f.img}" alt="${f.name}">
        <div class="meta">
          <h3>${f.name}</h3>
          <div class="when">${fmtDate(entry.date)}</div>
          ${entry.location ? `<div class="where">${escapeHtml(entry.location)}</div>` : ''}
          ${entry.notes ? `<div class="notes">"${escapeHtml(entry.notes)}"</div>` : ''}
        </div>
        <div class="actions">
          <button class="edit" data-edit="${entry.id}" title="Edit">✎</button>
          <button class="del" data-del="${entry.id}" data-fishname="${escapeHtml(f.name)}" title="Delete">✕</button>
        </div>
      </div>
    `;
  }).join('');
  return html;
}

function renderEditModal(entryId) {
  const entry = log.find(x => x.id === entryId);
  if (!entry) return;
  const f = FISH.find(x => x.id === entry.fishId);
  if (!f) return;
  const wrapper = document.createElement('div');
  wrapper.className = 'modal-bg';
  wrapper.innerHTML = `
    <div class="modal" data-stop="1">
      <div class="modal-grip"></div>
      <div class="modal-fish">
        <img class="pixel" src="${f.img}" alt="${f.name}">
        <h2>${f.name}</h2>
        <div class="rarity-tag ${f.rarity}">${RARITY_LABEL[f.rarity]}</div>
      </div>
      <div class="prev-catch">Editing this catch entry.</div>
      <div class="field-block">
        <label>Date</label>
        <input type="date" id="e-date" value="${entry.date}">
      </div>
      <div class="field-block">
        <label>Location</label>
        <input type="text" id="e-loc" placeholder="e.g. Tampa Bay" value="${escapeHtml(entry.location || '')}">
      </div>
      <div class="field-block">
        <label>Notes</label>
        <textarea id="e-notes" placeholder="Bait used, weather, size, who you were with...">${escapeHtml(entry.notes || '')}</textarea>
      </div>
      <button class="save-btn" id="e-save">SAVE CHANGES</button>
    </div>
  `;
  wrapper.addEventListener('click', e => {
    if (!e.target.closest('[data-stop]')) wrapper.remove();
  });
  wrapper.querySelector('#e-save').addEventListener('click', async () => {
    const date = wrapper.querySelector('#e-date').value || todayISO();
    const location = wrapper.querySelector('#e-loc').value.trim();
    const notes = wrapper.querySelector('#e-notes').value.trim();
    // Update the log entry in place
    const idx = log.findIndex(x => x.id === entryId);
    if (idx >= 0) {
      log[idx] = { ...log[idx], date, location, notes };
    }
    // Reconcile so state.catches reflects the most recent entry per fish
    reconcileCollection();
    await Promise.all([saveLog(), saveState()]);
    wrapper.remove();
    toast('Catch updated');
    render();
  });
  document.body.appendChild(wrapper);
}

function renderModal() {
  const f = FISH.find(x => x.id === modalFishId);
  if (!f) return;
  const prev = caughtFor(f.id);
  const wrapper = document.createElement('div');
  wrapper.className = 'modal-bg';
  wrapper.innerHTML = `
    <div class="modal" data-stop="1">
      <div class="modal-grip"></div>
      <div class="modal-fish">
        <img class="pixel" src="${f.img}" alt="${f.name}">
        <h2>${f.name}</h2>
        <div class="rarity-tag ${f.rarity}">${RARITY_LABEL[f.rarity]}</div>
      </div>
      ${prev ? `
        <div class="prev-catch">
          Last caught <strong>${fmtDate(prev.date)}</strong>${prev.location ? ' at <strong>' + escapeHtml(prev.location) + '</strong>' : ''}.
          Logging again will become the most recent.
        </div>
      ` : ''}
      <div class="field-block">
        <label>Date</label>
        <input type="date" id="m-date" value="${todayISO()}">
      </div>
      <div class="field-block">
        <label>Location</label>
        <input type="text" id="m-loc" placeholder="e.g. Tampa Bay" value="">
      </div>
      <div class="field-block">
        <label>Notes</label>
        <textarea id="m-notes" placeholder="Bait used, weather, size, who you were with..."></textarea>
      </div>
      <button class="save-btn" id="m-save">SAVE CATCH</button>
    </div>
  `;
  wrapper.addEventListener('click', e => {
    if (!e.target.closest('[data-stop]')) {
      modalFishId = null;
      wrapper.remove();
    }
  });
  wrapper.querySelector('#m-save').addEventListener('click', async () => {
    const date = wrapper.querySelector('#m-date').value || todayISO();
    const location = wrapper.querySelector('#m-loc').value.trim();
    const notes = wrapper.querySelector('#m-notes').value.trim();
    state.catches[f.id] = { date, location, notes };
    log.push({
      id: 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      fishId: f.id,
      date, location, notes
    });
    recentlyCaught.add(f.id);
    await Promise.all([saveState(), saveLog()]);
    modalFishId = null;
    wrapper.remove();
    toast(`${f.name} logged! 🎣`);
    view = 'collection';
    render();
  });
  document.body.appendChild(wrapper);
}

function bindEvents() {
  document.querySelectorAll('[data-nav]').forEach(el => {
    el.addEventListener('click', () => {
      view = el.dataset.nav;
      flippedCard = null;
      if (view !== 'collection') recentlyCaught.clear();
      render();
      window.scrollTo(0, 0);
    });
  });
  document.querySelectorAll('[data-action="flip"]').forEach(el => {
    el.addEventListener('click', () => {
      if (flippedCard && flippedCard !== el) flippedCard.classList.remove('flipped');
      el.classList.toggle('flipped');
      flippedCard = el.classList.contains('flipped') ? el : null;
    });
  });
  document.querySelectorAll('[data-action="shake"]').forEach(el => {
    el.addEventListener('click', () => {
      el.classList.remove('shake');
      void el.offsetWidth;
      el.classList.add('shake');
    });
  });
  document.querySelectorAll('[data-action="open-modal"]').forEach(el => {
    el.addEventListener('click', () => {
      modalFishId = el.dataset.fish;
      renderModal();
    });
  });
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      renderEditModal(el.dataset.edit);
    });
  });
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      const id = el.dataset.del;
      const fishname = el.dataset.fishname || 'this catch';
      showConfirm({
        title: 'Delete this catch?',
        message: `Remove the entry for ${fishname} from your catch log? This can't be undone.`,
        confirmText: 'Delete',
        onConfirm: async () => {
          log = log.filter(x => x.id !== id);
          reconcileCollection();
          await Promise.all([saveLog(), saveState()]);
          render();
          toast('Entry deleted');
        }
      });
    });
  });
}

(async () => {
  await loadState();
  render();
})();
</script>

<!-- Service worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.error('SW reg failed', err));
  });
}
</script>
